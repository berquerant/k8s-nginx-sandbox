name: CI

permissions: {}

on:
  push:
    branches:
      - main
  pull_request:

env:
  CHART_NAME: charts/nginx-sandbox

jobs:
  build:
    name: Run
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f
      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310

      - name: Run helm lint
        uses: WyriHaximus/github-action-helm3@e3894d973c282349e3d41d3347767f2b2545b583 # v4.0.2
        with:
          exec: helm lint --strict "$CHART_NAME"

      - name: Run chart-testing (lint)
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: ct lint --charts "$CHART_NAME" --target-branch $TARGET_BRANCH

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Run chart-testing (install)
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: ct install --charts "$CHART_NAME" --target-branch $TARGET_BRANCH
