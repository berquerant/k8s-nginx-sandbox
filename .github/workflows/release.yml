name: Release

permissions: {}

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'

jobs:
  release:
    permissions:
      contents: write
      packages: write
    name: Release
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Login to ghcr
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          skip_existing: true
        env:
          CR_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
      - name: Push to ghcr
        run: |
          set -x
          remote_url="oci://ghcr.io/berquerant/k8s-nginx-sandbox/charts"
          find .cr-release-packages -type f | while read -r package ; do
            name="$(helm show chart "$package" | yq .name)"
            version="$(helm show chart "$package" | yq .version)"
            if ! helm pull "${remote_url}/${name}:${version}" ; then
              helm push "$package" "$remote_url"
            fi
          done
